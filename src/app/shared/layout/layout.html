<mat-sidenav-container class="h-screen" [hasBackdrop]="true">
      
      <!-- Sidebar -->
      <mat-sidenav #sidenav mode="side" [opened]="isDesktop()" 
        class="bg-surface border-r border-gray-200 dark:border-gray-800 shadow-soft">
        
        <!-- Logo Area -->
        <div class="p-4 flex items-center justify-center border-b border-gray-100 dark:border-gray-800 h-16">
          <mat-icon class="text-primary text-3xl">dashboard</mat-icon>
          <span class="ml-2 text-xl font-bold text-surface-foreground">SaaS<span class="text-primary">UI</span></span>
        </div>
        
        <!-- Navigation -->
        <nav class="p-4 space-y-2">
          @for (item of navItems; track item.label) {
            <a 
              mat-button 
              [routerLink]="item.path" 
              routerLinkActive="bg-primary/10 text-primary font-medium"
              class="w-full flex items-center text-surface-foreground/70 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg px-4 py-3 transition-all duration-200"
            >
              <mat-icon class="mr-3 text-lg">{{ item.icon }}</mat-icon>
              {{ item.label }}
            </a>
          }
        </nav>
      </mat-sidenav>

      <!-- Main Content -->
      <mat-sidenav-content class="bg-surface dark:bg-[#0f172a]">
        
        <!-- Top Bar -->
        <mat-toolbar class="bg-surface/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50">
          <button mat-icon-button (click)="toggleSidenav()" class="mr-2 text-surface-foreground" *ngIf="!isDesktop()">
            <mat-icon>menu</mat-icon>
          </button>
          
          <span class="flex-1"></span>
          
          <!-- Theme Toggle -->
          <button mat-icon-button (click)="toggleTheme()" class="text-surface-foreground hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full">
            <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
          </button>

          <!-- User Profile -->
          <div class="ml-4 flex items-center gap-3">
            <div class="text-right hidden md:block">
              <p class="text-sm font-semibold text-surface-foreground">Admin User</p>
              <p class="text-xs text-surface-foreground/60">Administrator</p>
            </div>
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=0284c7&color=fff" 
                 class="w-9 h-9 rounded-full border-2 border-primary shadow-sm">
          </div>
        </mat-toolbar>

        <!-- Page Content -->
        <main class="p-6 max-w-7xl mx-auto">
          <router-outlet />
        </main>
      </mat-sidenav-content>
    </mat-sidenav-container>
